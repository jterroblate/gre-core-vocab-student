<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>第 01 单元 学生入口</title>
  <style>
:root{--cream:#f7f4ed;--paper:#fffdf8;--ink:#1c1c1c;--muted:#706b61;--line:#ece7dc;--line-strong:#ddd4c7;--green:#245d52;--gold:#b8893f;--wash:#f1e7d9}
*{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font:16px/1.55 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0}
a{color:inherit;text-decoration:none}
.shell{width:min(1180px,calc(100% - 44px));margin:auto;padding:28px 0 72px}
.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;align-items:end;min-height:230px;border:1px solid var(--line);border-radius:18px;padding:30px;background:radial-gradient(circle at 18% 0%,rgba(184,137,63,.2),transparent 34%),radial-gradient(circle at 85% 20%,rgba(36,93,82,.14),transparent 34%),var(--paper)}
.eyebrow{margin:0 0 10px;color:var(--green);font-size:13px;font-weight:720;letter-spacing:.08em;text-transform:uppercase}
h1{margin:0;font-size:48px;line-height:1.02;font-weight:720;letter-spacing:-1.2px}
.lead{max-width:680px;margin:14px 0 0;color:var(--muted);font-size:16px}
.hero-panel{display:grid;gap:10px;justify-self:end;width:min(360px,100%)}
.hero-stat{display:flex;justify-content:space-between;gap:16px;border-top:1px solid var(--line);padding-top:10px;color:var(--muted)}
.hero-stat strong{color:var(--ink);font-size:22px}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:28px 0 14px}
h2{margin:0;font-size:24px;letter-spacing:-.35px}
.hint{margin:0;color:var(--muted);font-size:14px}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.unit-card{position:relative;display:grid;gap:13px;min-height:176px;border:1px solid var(--line);border-radius:16px;background:var(--paper);padding:18px;transition:transform .16s ease,border-color .16s ease,background .16s ease}
.unit-card:hover{transform:translateY(-2px);border-color:var(--line-strong);background:#fffaf0}
.unit-kicker{display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:13px}
.unit-number{font-family:Georgia,"Times New Roman",serif;font-size:34px;line-height:1;color:var(--green);font-weight:700;letter-spacing:-.7px}
.unit-name{display:grid;gap:2px}
.unit-name strong{font-size:20px;letter-spacing:-.25px}
.unit-name span{color:var(--muted);font-size:13px}
.path{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.pill{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;padding:4px 8px;background:#fbf8f0;color:var(--muted);font-size:12px}
.pill.ready{border-color:rgba(36,93,82,.28);color:var(--green);background:rgba(36,93,82,.06)}
.pill.missing{color:#aaa;background:#f7f4ed}
.meta{color:var(--muted);font-size:13px}
.topbar{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:rgba(247,244,237,.92);backdrop-filter:blur(16px)}
.topbar-inner{width:min(1180px,calc(100% - 44px));margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:52px}
.brand{font-weight:720;letter-spacing:-.25px}
.nav-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;border:1px solid var(--line-strong);border-radius:8px;padding:6px 11px;background:transparent;color:var(--ink);font-size:13px}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.unit-hero{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end;border:1px solid var(--line);border-radius:18px;background:radial-gradient(circle at 12% 0%,rgba(184,137,63,.18),transparent 34%),var(--paper);padding:28px;margin-top:24px}
.unit-hero h1{font-size:42px}
.lesson-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:16px}
.lesson-card{display:grid;gap:10px;border:1px solid var(--line);border-radius:16px;background:var(--paper);padding:18px;min-height:180px}
.lesson-card.disabled{opacity:.55}
.lesson-card h2{font-size:22px}
.lesson-card p{margin:0;color:var(--muted);font-size:14px}
.lesson-card .btn{width:max-content;margin-top:auto}
.small-link{color:var(--green);font-weight:650}
@media(max-width:800px){.shell{width:min(100% - 28px,1180px);padding-top:18px}.hero,.unit-hero{grid-template-columns:1fr;padding:22px}.hero-panel{justify-self:stretch}h1{font-size:38px}.lesson-grid{grid-template-columns:1fr}.topbar-inner{width:min(100% - 28px,1180px);align-items:flex-start;flex-direction:column;padding:10px 0}.nav-actions{width:100%}.btn{flex:1}}
</style>

<!-- gre-pages-auth-v1 -->
<style>
  html.gre-auth-locked body > :not(#greAuthGate) {
    visibility: hidden !important;
  }
  html.gre-auth-locked body {
    min-height: 100vh;
    overflow: hidden;
  }
  #greAuthGate {
    position: fixed;
    inset: 0;
    z-index: 2147483647;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at 18% 12%, rgba(194, 148, 82, 0.14), transparent 32%),
      linear-gradient(135deg, #fbf5e9 0%, #f7efe1 48%, #eef4ed 100%);
    color: #1f231f;
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    visibility: visible !important;
  }
  html.gre-auth-unlocked #greAuthGate {
    display: none !important;
  }
  .gre-auth-card {
    width: min(420px, 100%);
    border: 1px solid rgba(68, 72, 61, 0.18);
    border-radius: 22px;
    padding: 28px;
    background: rgba(255, 252, 245, 0.92);
    box-shadow: 0 24px 70px rgba(50, 43, 32, 0.14);
  }
  .gre-auth-kicker {
    margin: 0 0 10px;
    color: #72705f;
    font-size: 13px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .gre-auth-title {
    margin: 0 0 8px;
    font-size: 28px;
    line-height: 1.15;
    font-weight: 780;
  }
  .gre-auth-copy {
    margin: 0 0 20px;
    color: #5f6258;
    font-size: 14px;
    line-height: 1.65;
  }
  .gre-auth-field {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid rgba(56, 63, 54, 0.22);
    border-radius: 14px;
    padding: 13px 14px;
    font-size: 16px;
    background: #fffdf8;
    color: #1f231f;
    outline: none;
  }
  .gre-auth-field:focus {
    border-color: #8c7a45;
    box-shadow: 0 0 0 4px rgba(140, 122, 69, 0.14);
  }
  .gre-auth-submit {
    width: 100%;
    margin-top: 12px;
    border: 0;
    border-radius: 14px;
    padding: 13px 16px;
    background: #28362d;
    color: #fffaf0;
    font-size: 15px;
    font-weight: 720;
    cursor: pointer;
  }
  .gre-auth-submit:hover {
    background: #1f2c24;
  }
  .gre-auth-error {
    min-height: 20px;
    margin: 10px 2px 0;
    color: #9d2f22;
    font-size: 13px;
  }
</style>
<script>
(function() {
  var AUTH_KEY = "gre_core_vocab_student_auth_v1";
  var AUTH_HASH = "6c7525332e9c649fd02547881102b234421192891292561dd720fa7985fc2e40";
  var root = document.documentElement;

  function setLockedState() {
    try {
      if (localStorage.getItem(AUTH_KEY) === AUTH_HASH) {
        root.classList.add("gre-auth-unlocked");
        root.classList.remove("gre-auth-locked");
        return false;
      }
    } catch (error) {}
    root.classList.add("gre-auth-locked");
    root.classList.remove("gre-auth-unlocked");
    return true;
  }

  function hex(buffer) {
    return Array.prototype.map.call(new Uint8Array(buffer), function(byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");
  }

  async function digest(value) {
    var data = new TextEncoder().encode(value);
    return hex(await crypto.subtle.digest("SHA-256", data));
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_KEY, AUTH_HASH);
    } catch (error) {}
    root.classList.add("gre-auth-unlocked");
    root.classList.remove("gre-auth-locked");
    var gate = document.getElementById("greAuthGate");
    if (gate) gate.remove();
  }

  function installGate() {
    if (!setLockedState() || document.getElementById("greAuthGate")) return;
    var gate = document.createElement("div");
    gate.id = "greAuthGate";
    gate.innerHTML = '<form class="gre-auth-card" id="greAuthForm">' +
      '<p class="gre-auth-kicker">Student Access</p>' +
      '<h1 class="gre-auth-title">GRE 核心词汇一本通</h1>' +
      '<p class="gre-auth-copy">请输入老师提供的访问密码。</p>' +
      '<input class="gre-auth-field" id="greAuthPassword" type="password" autocomplete="current-password" placeholder="访问密码" autofocus>' +
      '<button class="gre-auth-submit" type="submit">进入学习页面</button>' +
      '<p class="gre-auth-error" id="greAuthError" aria-live="polite"></p>' +
    '</form>';
    document.body.appendChild(gate);
    var form = document.getElementById("greAuthForm");
    var input = document.getElementById("greAuthPassword");
    var error = document.getElementById("greAuthError");
    if (input) input.focus();
    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      error.textContent = "";
      var value = input.value || "";
      if (!window.crypto || !crypto.subtle) {
        error.textContent = "当前浏览器不支持安全校验，请换用最新版 Chrome 或 Safari。";
        return;
      }
      if (await digest(value) === AUTH_HASH) {
        unlock();
      } else {
        input.value = "";
        input.focus();
        error.textContent = "密码不正确，请重新输入。";
      }
    });
  }

  setLockedState();
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installGate);
  } else {
    installGate();
  }
})();
</script>

</head>
