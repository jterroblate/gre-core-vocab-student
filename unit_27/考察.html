:"noun","core_en":"the pursuit of ideals, often with less attention to practical limits","audio_src":"audio/055_idealism.mp3","patterns":["youthful idealism","political idealism","idealism and realism"],"examples":[{"sentence":"Youthful idealism pushed the volunteers to work for social reform."},{"sentence":"The plan showed admirable idealism but ignored financial limits."}],"related":[{"word":"optimism","example":""},{"word":"principle","example":""},{"word":"utopianism","example":""},{"word":"realism","example":""},{"word":"cynicism","example":""},{"word":"ideal","example":""},{"word":"idealist","example":""},{"word":"idealize","example":""}]},{"unit_id":"unit_27","index":56,"word":"sympathetic","phonetic":"/ˌsɪmpəˈθetɪk/","pos":"adjective","core_en":"showing understanding, support, or approval","audio_src":"audio/056_sympathetic.mp3","patterns":["sympathetic listener","sympathetic response","be sympathetic to someone","sympathetic to reform","sympathetic toward the proposal","a sympathetic audience"],"examples":[{"sentence":"The counselor offered a sympathetic response to the student’s worries."},{"sentence":"Several lawmakers were sympathetic to the reform proposal."}],"related":[{"word":"supportive","example":""},{"word":"compassionate","example":""},{"word":"empathetic","example":""},{"word":"hostile","example":""},{"word":"unsympathetic","example":""},{"word":"sympathy","example":""},{"word":"sympathize","example":""}]},{"unit_id":"unit_27","index":57,"word":"seek","phonetic":"/siːk/","pos":"verb","core_en":"to try to find, obtain, or achieve something","audio_src":"audio/057_seek.mp3","patterns":["seek help","seek approval","seek a solution","seek to explain","seek to improve","seek to reduce"],"examples":[{"sentence":"The researchers sought a solution to the problem."},{"sentence":"Many families sought refuge across the border."},{"sentence":"The article seeks to explain why the policy failed."}],"related":[{"word":"look for","example":""},{"word":"try","example":""},{"word":"pursue","example":""},{"word":"avoid","example":""},{"word":"seeker","example":""},{"word":"sought","example":""}]},{"unit_id":"unit_27","index":58,"word":"misnomer","phonetic":"/ˌmɪsˈnoʊmər/","pos":"noun","core_en":"a wrong or inaccurate name or label","audio_src":"audio/058_misnomer.mp3","patterns":["a misnomer","call something a misnomer","the term is a misnomer"],"examples":[{"sentence":"Calling the village a city is a misnomer."},{"sentence":"The term “silent film” is sometimes a misnomer because many screenings had live music."}],"related":[{"word":"wrong name","example":""},{"word":"inaccurate label","example":""},{"word":"mislabeling","example":""},{"word":"accurate term","example":""},{"word":"nominal","example":""},{"word":"nomenclature","example":""},{"word":"misname","example":""}]},{"unit_id":"unit_27","index":59,"word":"deduce","phonetic":"/dɪˈduːs/","pos":"verb","core_en":"to reach a conclusion by reasoning from evidence or premises","audio_src":"audio/059_deduce.mp3","patterns":["deduce from evidence","deduce the cause","deduce that"],"examples":[{"sentence":"From the footprints, the detective deduced that two people had entered the room."},{"sentence":"Scientists deduced the planet’s size from changes in the star’s light."}],"related":[{"word":"infer","example":""},{"word":"conclude","example":""},{"word":"derive","example":""},{"word":"guess","example":""},{"word":"deduction","example":""},{"word":"deductive","example":""},{"word":"induce","example":""}]},{"unit_id":"unit_27","index":60,"word":"shortcut","phonetic":"/ˈʃɔːrtkʌt/","pos":"noun / verb","core_en":"a quicker way to reach a place or achieve something","audio_src":"audio/060_shortcut.mp3","patterns":["take a shortcut","a shortcut to success","keyboard shortcut","desktop shortcut"],"examples":[{"sentence":"We took a shortcut through the park."},{"sentence":"There is no shortcut to mastering a difficult language."},{"sentence":"Learning keyboard shortcuts can save time."}],"related":[{"word":"quicker route","example":""},{"word":"time-saver","example":""},{"word":"expedient","example":""},{"word":"long way","example":""},{"word":"short","example":""},{"word":"cut","example":""},{"word":"shorten","example":""}]},{"unit_id":"unit_27","index":61,"word":"on the part of","phonetic":"/ɑːn ðə pɑːrt əv/","pos":"prepositional phrase","core_en":"done by, shown by, or coming from a particular person or group","audio_src":"audio/061_on-the-part-of.mp3","patterns":["effort on the part of","negligence on the part of","willingness on the part of"],"examples":[{"sentence":"The rescue required courage on the part of every volunteer."},{"sentence":"The accident resulted from negligence on the part of the company."}],"related":[{"word":"by","example":""},{"word":"from","example":""},{"word":"attributable to","example":""},{"word":"independent of","example":""},{"word":"part","example":""},{"word":"participate","example":""}]},{"unit_id":"unit_27","index":62,"word":"relief","phonetic":"/rɪˈliːf/","pos":"noun","core_en":"a reduction of pain, worry, or pressure, or help given in difficulty","audio_src":"audio/062_relief.mp3","patterns":["relief from pain","a sense of relief","temporary relief","disaster relief","relief aid","relief efforts"],"examples":[{"sentence":"The medicine brought relief from the pain."},{"sentence":"She felt a wave of relief when the exam ended."},{"sentence":"International relief efforts began after the flood."}],"related":[{"word":"comfort","example":""},{"word":"ease","example":""},{"word":"alleviation","example":""},{"word":"distress","example":""},{"word":"relieve","example":""},{"word":"relieved","example":""},{"word":"alleviate","example":""}]},{"unit_id":"unit_27","index":63,"word":"attenuate","phonetic":"/əˈtenjueɪt/","pos":"verb","core_en":"to reduce the force, amount, or intensity of something","audio_src":"audio/063_attenuate.mp3","patterns":["attenuate the effect","attenuate a signal","attenuate symptoms"],"examples":[{"sentence":"The trees attenuated the noise from the highway."},{"sentence":"The vaccine uses an attenuated form of the virus."}],"related":[{"word":"weaken","example":""},{"word":"reduce","example":""},{"word":"diminish","example":""},{"word":"intensify","example":""},{"word":"amplify","example":""},{"word":"attenuation","example":""},{"word":"attenuated","example":""},{"word":"tenuous","example":""}]},{"unit_id":"unit_27","index":64,"word":"trickster","phonetic":"/ˈtrɪkstər/","pos":"noun","core_en":"a person or character who deceives, cheats, or plays tricks","audio_src":"audio/064_trickster.mp3","patterns":["a clever trickster","mythic trickster","trickster figure"],"examples":[{"sentence":"The trickster persuaded villagers to give him their money."},{"sentence":"In many myths, the trickster breaks rules and exposes hidden truths."}],"related":[{"word":"deceiver","example":""},{"word":"cheat","example":""},{"word":"con artist","example":""},{"word":"honest person","example":""},{"word":"trick","example":""},{"word":"tricky","example":""},{"word":"trickery","example":""}]},{"unit_id":"unit_27","index":65,"word":"relic","phonetic":"/ˈrelɪk/","pos":"noun","core_en":"an object, custom, or idea that survives from an earlier time","audio_src":"audio/065_relic.mp3","patterns":["ancient relic","religious relic","relic of the past"],"examples":[{"sentence":"The museum displayed relics from the ancient city."},{"sentence":"The law is a relic of an earlier political era."}],"related":[{"word":"remnant","example":""},{"word":"artifact","example":""},{"word":"vestige","example":""},{"word":"innovation","example":""},{"word":"relict","example":""},{"word":"relics","example":""}]},{"unit_id":"unit_27","index":66,"word":"as if","phonetic":"/æz ɪf/","pos":"conjunction phrase","core_en":"in a way that suggests something were true","audio_src":"audio/066_as-if.mp3","patterns":["as if nothing happened","as if he knew","look as if","as if it were true","as if by magic"],"examples":[{"sentence":"She spoke as if nothing had happened."},{"sentence":"The room looked as if it had not been used for years."},{"sentence":"He acted as if he were the only person affected."}],"related":[{"word":"as though","example":""},{"word":"like","example":""},{"word":"seem as if","example":""},{"word":"actually","example":""},{"word":"if","example":""},{"word":"as","example":""},{"word":"seem","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let unknown = new Set(JSON.parse(localStorage.getItem(storeKey) || '[]'));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function saveMarks() {
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
}

function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => {
    if (statusLine.textContent === t) statusLine.textContent = '';
  }, 2200);
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}

function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) {
    stopAudio();
    return;
  }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
  audio.play().catch(() => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}

function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}

function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    unknown.has(i.index) ? unknown.delete(i.index) : unknown.add(i.index);
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    playAudio(audioButton);
  });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}

function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}

function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => {
    if (!cardOverlay.classList.contains('open')) {
      floatingCardHost.innerHTML = '';
      cardOverlay.setAttribute('aria-hidden', 'true');
    }
  }, 260);
}

function selectedUnknownItems() {
  return unit.items.filter(i => unknown.has(i.index));
}

function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}

function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}

function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCard();
});
document.getElementById('clearMarks').addEventListener('click', () => {
  unknown = new Set();
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  try {
    await copyToClipboard(buildText(items));
    setStatus(`已复制 ${items.length} 个不会词`);
  } catch (e) {
    setStatus('复制失败，可以改用导出 CSV');
  }
});
saveMarks();
renderGrid();
</script>
