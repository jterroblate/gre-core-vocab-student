<script>
(function() {
  var AUTH_KEY = "gre_core_vocab_student_auth_v1";
  var AUTH_HASH = "6c7525332e9c649fd02547881102b234421192891292561dd720fa7985fc2e40";
  var root = document.documentElement;

  function setLockedState() {
    try {
      if (localStorage.getItem(AUTH_KEY) === AUTH_HASH) {
        root.classList.add("gre-auth-unlocked");
        root.classList.remove("gre-auth-locked");
        return false;
      }
    } catch (error) {}
    root.classList.add("gre-auth-locked");
    root.classList.remove("gre-auth-unlocked");
    return true;
  }

  function hex(buffer) {
    return Array.prototype.map.call(new Uint8Array(buffer), function(byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");
  }

  async function digest(value) {
    var data = new TextEncoder().encode(value);
    return hex(await crypto.subtle.digest("SHA-256", data));
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_KEY, AUTH_HASH);
    } catch (error) {}
    root.classList.add("gre-auth-unlocked");
    root.classList.remove("gre-auth-locked");
    var gate = document.getElementById("greAuthGate");
    if (gate) gate.remove();
  }

  function installGate() {
    if (!setLockedState() || document.getElementById("greAuthGate")) return;
    var gate = document.createElement("div");
    gate.id = "greAuthGate";
    gate.innerHTML = '<form class="gre-auth-card" id="greAuthForm">' +
      '<p class="gre-auth-kicker">Student Access</p>' +
      '<h1 class="gre-auth-title">GRE 核心词汇一本通</h1>' +
      '<p class="gre-auth-copy">请输入老师提供的访问密码。</p>' +
      '<input class="gre-auth-field" id="greAuthPassword" type="password" autocomplete="current-password" placeholder="访问密码" autofocus>' +
      '<button class="gre-auth-submit" type="submit">进入学习页面</button>' +
      '<p class="gre-auth-error" id="greAuthError" aria-live="polite"></p>' +
    '</form>';
    document.body.appendChild(gate);
    var form = document.getElementById("greAuthForm");
    var input = document.getElementById("greAuthPassword");
    var error = document.getElementById("greAuthError");
    if (input) input.focus();
    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      error.textContent = "";
      var value = input.value || "";
      if (!window.crypto || !crypto.subtle) {
        error.textContent = "当前浏览器不支持安全校验，请换用最新版 Chrome 或 Safari。";
        return;
      }
      if (await digest(value) === AUTH_HASH) {
        unlock();
      } else {
        input.value = "";
        input.focus();
        error.textContent = "密码不正确，请重新输入。";
      }
    });
  }

  setLockedState();
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installGate);
  } else {
    installGate();
  }
})();
</script>

der resentment","engender sympathy","engender strife","engender debate","engender conflict","engender change"],"examples":[{"sentence":"The agreement engendered a feeling of mutual respect between the two groups."},{"sentence":"Unequal treatment can engender resentment even among loyal workers."},{"sentence":"Angry words engender strife."}],"related":[{"word":"cause","example":""},{"word":"produce","example":""},{"word":"generate","example":""},{"word":"induce","example":""},{"word":"breed","example":""},{"word":"prevent","example":""},{"word":"suppress","example":""},{"word":"engendered","example":""},{"word":"generation","example":""},{"word":"genesis","example":""}]},{"unit_id":"unit_04","index":91,"word":"totem","phonetic":"/ˈtoʊtəm/","pos":"n.","core_en":"an object, animal, or idea that serves as a powerful symbol for a group or belief","audio_src":"audio/091_totem.mp3","patterns":["a tribal totem","a sacred totem","a political totem","a cultural totem"],"examples":[{"sentence":"The carved animal served as a totem for the clan."},{"sentence":"For some activists, the old factory became a totem of working-class pride."}],"related":[{"word":"symbol","example":""},{"word":"emblem","example":""},{"word":"icon","example":""},{"word":"avatar","example":""},{"word":"idol","example":""},{"word":"totemic","example":""},{"word":"totemism","example":""},{"word":"emblematic","example":""},{"word":"symbolic","example":""}]},{"unit_id":"unit_04","index":92,"word":"tyro","phonetic":"/ˈtaɪroʊ/","pos":"n.","core_en":"a beginner or novice, especially someone with little experience in a field","audio_src":"audio/092_tyro.mp3","patterns":["a political tyro","a tyro in foreign affairs","a tyro in business"],"examples":[{"sentence":"Although brilliant in science, he was a tyro in politics."},{"sentence":"The diplomat was no tyro in foreign affairs; she had negotiated several major treaties."}],"related":[{"word":"beginner","example":""},{"word":"novice","example":""},{"word":"neophyte","example":""},{"word":"rookie","example":""},{"word":"expert","example":""},{"word":"veteran","example":""},{"word":"apprentice","example":""}]},{"unit_id":"unit_04","index":93,"word":"blemish","phonetic":"/ˈblemɪʃ/","pos":"n.; v.","core_en":"a small flaw or mark that spoils appearance, reputation, or perfection","audio_src":"audio/093_blemish.mp3","patterns":["a skin blemish","a blemish on the surface","minor blemishes","a blemish on one's record","an unblemished reputation","without blemish"],"examples":[{"sentence":"The photograph showed every blemish on the wall."},{"sentence":"The scandal left a lasting blemish on his reputation."},{"sentence":"Local government is not without blemish, but the new policy did solve several urgent problems."}],"related":[{"word":"flaw","example":""},{"word":"mark","example":""},{"word":"defect","example":""},{"word":"taint","example":""},{"word":"perfection","example":""},{"word":"purity","example":""},{"word":"blotch","example":""},{"word":"blemished","example":""},{"word":"unblemished","example":""},{"word":"flawless","example":""}]},{"unit_id":"unit_04","index":94,"word":"formulate","phonetic":"/ˈfɔːrmjəleɪt/","pos":"v.","core_en":"to develop or express a plan, theory, policy, or idea in a clear and systematic way","audio_src":"audio/094_formulate.mp3","patterns":["formulate a policy","formulate a plan","formulate a strategy","formulate a proposal","formulate a theory","formulate an argument","formulate a hypothesis","formulate a question"],"examples":[{"sentence":"The committee spent months formulating a policy on data privacy."},{"sentence":"Before the debate, she formulated a clear strategy for responding to criticism."},{"sentence":"The scientist formulated a theory to explain the unusual results."}],"related":[{"word":"create","example":""},{"word":"develop","example":""},{"word":"devise","example":""},{"word":"articulate","example":""},{"word":"improvise","example":""},{"word":"formula","example":""},{"word":"formulation","example":""},{"word":"formulaic","example":""},{"word":"form","example":""},{"word":"reformulate","example":""}]},{"unit_id":"unit_04","index":95,"word":"foreground","phonetic":"/ˈfɔːrɡraʊnd/","pos":"v.; n.","core_en":"to make something especially noticeable or important; the part of a scene closest to the viewer","audio_src":"audio/095_foreground.mp3","patterns":["foreground a theme","foreground a relationship","foreground an issue","foreground a contrast","in the foreground","the foreground of a painting","foreground detail"],"examples":[{"sentence":"The play foregrounds the relationship between father and daughter."},{"sentence":"The essay foregrounds the tension between personal freedom and social responsibility."},{"sentence":"In the foreground of the photograph, a child is standing beside a broken bicycle."}],"related":[{"word":"emphasize","example":""},{"word":"highlight","example":""},{"word":"underscore","example":""},{"word":"accentuate","example":""},{"word":"background","example":""},{"word":"downplay","example":""},{"word":"foregrounding","example":""},{"word":"foregrounded","example":""},{"word":"foremost","example":""}]},{"unit_id":"unit_04","index":96,"word":"momentary","phonetic":"/ˈmoʊmənteri/","pos":"adj.","core_en":"lasting for only a very short time","audio_src":"audio/096_momentary.mp3","patterns":["a momentary pause","a momentary delay","a momentary lapse","a momentary feeling of fear"],"examples":[{"sentence":"There was a momentary pause before the speaker answered."},{"sentence":"A momentary feeling of fear crossed her mind, but she kept walking."}],"related":[{"word":"brief","example":""},{"word":"short-lived","example":""},{"word":"fleeting","example":""},{"word":"ephemeral","example":""},{"word":"transitory","example":""},{"word":"lasting","example":""},{"word":"permanent","example":""},{"word":"momentous","example":""},{"word":"moment","example":""},{"word":"momentarily","example":""}]},{"unit_id":"unit_04","index":97,"word":"moment ction","mixed feelings","a mixed group","a mixed audience","mixed materials"],"examples":[{"sentence":"The play received mixed reviews from critics."},{"sentence":"The experiment produced mixed results, so the researchers repeated it."},{"sentence":"The workshop attracted a mixed audience of students, teachers, and local residents."}],"related":[{"word":"varied","example":""},{"word":"unclear","example":""},{"word":"ambivalent","example":""},{"word":"inconclusive","example":""},{"word":"unanimous","example":""},{"word":"uniform","example":""},{"word":"contradictory","example":""},{"word":"mix","example":""},{"word":"mixture","example":""},{"word":"mixedly","example":""}]},{"unit_id":"unit_04","index":100,"word":"wholesale","phonetic":"/ˈhoʊlseɪl/","pos":"adj.; adv.","core_en":"done on a large scale, often without careful distinction","audio_src":"audio/100_wholesale.mp3","patterns":["wholesale firings","wholesale changes","wholesale cuts","wholesale destruction","reject something wholesale","accept something wholesale","dismiss something wholesale"],"examples":[{"sentence":"The company announced wholesale firings after the merger."},{"sentence":"The reform did not require wholesale changes to the education system."},{"sentence":"The committee rejected the proposal wholesale instead of revising its weakest parts."}],"related":[{"word":"large-scale","example":""},{"word":"extensive","example":""},{"word":"sweeping","example":""},{"word":"indiscriminate","example":""},{"word":"selective","example":""},{"word":"piecemeal","example":""},{"word":"retail","example":""},{"word":"wholesaler","example":""},{"word":"wholesale","example":""},{"word":"whole","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
const metaKey = `${storeKey}:meta_v1`;
const clearKey = `${storeKey}:clearedAt`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let syncTimer = null;
let cloudHydrated = false;
let lastSyncError = null;
let unknownMeta = loadUnknownMeta();
let unknown = new Set(Object.entries(unknownMeta).filter(([, value]) => value.marked).map(([index]) => Number(index)));

function nowIso() { return new Date().toISOString(); }
function timeOf(value) {
  const time = value ? new Date(value).getTime() : 0;
  return Number.isFinite(time) ? time : 0;
}
function loadLegacyUnknown() {
  try { return JSON.parse(localStorage.getItem(storeKey) || '[]'); } catch { return []; }
}
function normalizeExamMarks(raw) {
  const normalized = {};
  for (const [index, value] of Object.entries(raw || {})) {
    if (!value || typeof value !== 'object') continue;
    normalized[String(index)] = { marked: !!value.marked, updatedAt: value.updatedAt || nowIso() };
  }
  return normalized;
}
function loadUnknownMeta() {
  let parsed = null;
  try { parsed = JSON.parse(localStorage.getItem(metaKey) || 'null'); } catch {}
  if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) return normalizeExamMarks(parsed);
  const timestamp = nowIso();
  const migrated = {};
  for (const index of loadLegacyUnknown()) migrated[String(index)] = { marked: true, updatedAt: timestamp };
  return migrated;
}
function readLocalClearTime() {
  try { return localStorage.getItem(clearKey) || null; } catch { return null; }
}
function writeLocalClearTime(value) {
  try { value ? localStorage.setItem(clearKey, value) : localStorage.removeItem(clearKey); } catch {}
}
function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function saveMarks(options = {}) {
  unknown = new Set(Object.entries(unknownMeta).filter(([, value]) => value.marked).map(([index]) => Number(index)));
  localStorage.setItem(metaKey, JSON.stringify(unknownMeta));
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
  if (!options.skipCloud) scheduleCloudSave();
}
function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => { if (statusLine.textContent === t) statusLine.textContent = ''; }, 2200);
}
function stopAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}
function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) { stopAudio(); return; }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => { button.classList.remove('playing'); button.classList.add('error'); setStatus('音频暂时无法播放'); });
  audio.play().catch(() => { button.classList.remove('playing'); button.classList.add('error'); setStatus('音频暂时无法播放'); });
}
function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}
function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}
function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    const key = String(i.index);
    const current = unknownMeta[key]?.marked;
    unknownMeta[key] = { marked: !current, updatedAt: nowIso() };
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => { event.preventDefault(); event.stopPropagation(); playAudio(audioButton); });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}
function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}
function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => { if (!cardOverlay.classList.contains('open')) { floatingCardHost.innerHTML = ''; cardOverlay.setAttribute('aria-hidden', 'true'); } }, 260);
}
function selectedUnknownItems() { return unit.items.filter(i => unknown.has(i.index)); }
function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}
function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}
function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}
function localPayload() { return { unitId: unit.unit_id, examUnknownMarks: normalizeExamMarks(unknownMeta), examClearedAt: readLocalClearTime(), sourceClient: 'gre-static-web' }; }
function sessionReady() { return window.greCloudbaseSession && typeof window.greCloudbaseSession.callFunction === 'function'; }
function mergeRemoteState(remote) {
  const incomingMarks = normalizeExamMarks(remote?.examUnknownMarks || {});
  const localClear = readLocalClearTime();
  const remoteClear = remote?.examClearedAt || null;
  const nextClear = timeOf(remoteClear) > timeOf(localClear) ? remoteClear : localClear;
  const merged = { ...unknownMeta };
  for (const [index, incoming] of Object.entries(incomingMarks)) {
    const current = merged[index];
    if (!current || timeOf(incoming.updatedAt) > timeOf(current.updatedAt)) merged[index] = incoming;
  }
  const clearTime = timeOf(nextClear);
  for (const [index, value] of Object.entries(merged)) if (timeOf(value.updatedAt) <= clearTime) delete merged[index];
  unknownMeta = merged;
  writeLocalClearTime(nextClear);
  saveMarks({ skipCloud: true });
}
async function hydrateCloudState() {
  if (!sessionReady() || cloudHydrated) return;
  cloudHydrated = true;
  try {
    const data = await window.greCloudbaseSession.callFunction('getGreCoreUnitState', { unitId: unit.unit_id });
    mergeRemoteState(data?.state || {});
    renderGrid();
    scheduleCloudSave(300);
  } catch (error) {
    lastSyncError = error;
    console.warn('[gre sync] exam hydrate failed', error);
  }
}
function scheduleCloudSave(delay = 900) {
  if (!sessionReady()) return;
  if (syncTimer) window.clearTimeout(syncTimer);
  syncTimer = window.setTimeout(() => { syncTimer = null; saveCloudState(); }, delay);
}
async function saveCloudState() {
  if (!sessionReady()) return;
  try {
    const data = await window.greCloudbaseSession.callFunction('saveGreCoreUnitState', { unitId: unit.unit_id, state: localPayload() });
    mergeRemoteState(data?.state || {});
    renderGrid();
    lastSyncError = null;
  } catch (error) {
    lastSyncError = error;
    console.warn('[gre sync] exam save failed', error);
  }
}
window.addEventListener('gre-cloudbase-session-ready', () => hydrateCloudState());
if (sessionReady()) hydrateCloudState();
window.addEventListener('pagehide', () => { if (sessionReady()) saveCloudState(); });

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });
document.getElementById('clearMarks').addEventListener('click', () => {
  unknownMeta = {};
  writeLocalClearTime(nowIso());
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) { setStatus('还没有标记不会的词'); return; }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); return; }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) { setStatus('还没有标记不会的词'); return; }
  try { await copyToClipboard(buildText(items)); setStatus(`已复制 ${items.length} 个不会词`); }
  catch(e) { setStatus('复制失败，可以改用导出 CSV'); }
});
saveMarks({ skipCloud: true });
renderGrid();
</script>
