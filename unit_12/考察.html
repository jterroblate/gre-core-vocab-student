<script>
(function() {
  var AUTH_KEY = "gre_core_vocab_student_auth_v1";
  var AUTH_HASH = "6c7525332e9c649fd02547881102b234421192891292561dd720fa7985fc2e40";
  var root = document.documentElement;

  function setLockedState() {
    try {
      if (localStorage.getItem(AUTH_KEY) === AUTH_HASH) {
        root.classList.add("gre-auth-unlocked");
        root.classList.remove("gre-auth-locked");
        return false;
      }
    } catch (error) {}
    root.classList.add("gre-auth-locked");
    root.classList.remove("gre-auth-unlocked");
    return true;
  }

  function hex(buffer) {
    return Array.prototype.map.call(new Uint8Array(buffer), function(byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");
  }

  async function digest(value) {
    var data = new TextEncoder().encode(value);
    return hex(await crypto.subtle.digest("SHA-256", data));
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_KEY, AUTH_HASH);
    } catch (error) {}
    root.classList.add("gre-auth-unlocked");
    root.classList.remove("gre-auth-locked");
    var gate = document.getElementById("greAuthGate");
    if (gate) gate.remove();
  }

  function installGate() {
    if (!setLockedState() || document.getElementById("greAuthGate")) return;
    var gate = document.createElement("div");
    gate.id = "greAuthGate";
    gate.innerHTML = '<form class="gre-auth-card" id="greAuthForm">' +
      '<p class="gre-auth-kicker">Student Access</p>' +
      '<h1 class="gre-auth-title">GRE 核心词汇一本通</h1>' +
      '<p class="gre-auth-copy">请输入老师提供的访问密码。</p>' +
      '<input class="gre-auth-field" id="greAuthPassword" type="password" autocomplete="current-password" placeholder="访问密码" autofocus>' +
      '<button class="gre-auth-submit" type="submit">进入学习页面</button>' +
      '<p class="gre-auth-error" id="greAuthError" aria-live="polite"></p>' +
    '</form>';
    document.body.appendChild(gate);
    var form = document.getElementById("greAuthForm");
    var input = document.getElementById("greAuthPassword");
    var error = document.getElementById("greAuthError");
    if (input) input.focus();
    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      error.textContent = "";
      var value = input.value || "";
      if (!window.crypto || !crypto.subtle) {
        error.textContent = "当前浏览器不支持安全校验，请换用最新版 Chrome 或 Safari。";
        return;
      }
      if (await digest(value) === AUTH_HASH) {
        unlock();
      } else {
        input.value = "";
        input.focus();
        error.textContent = "密码不正确，请重新输入。";
      }
    });
  }

  setLockedState();
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installGate);
  } else {
    installGate();
  }
})();
</script>

"embody","example":""},{"word":"contradict","example":""},{"word":"example","example":""},{"word":"exemplary","example":""},{"word":"exemplification","example":""}]},{"unit_id":"unit_12","index":85,"word":"aghast","phonetic":"/əˈɡæst/","pos":"adj.","core_en":"shocked and horrified","audio_src":"audio/085_aghast.mp3","patterns":["be aghast at","be aghast by","look aghast"],"examples":[{"sentence":"The audience was aghast at the cruelty of the scene."},{"sentence":"The description seemed aghast because it shaped how readers judged the evidence."}],"related":[{"word":"shocked","example":""},{"word":"appalled","example":""},{"word":"unmoved","example":""},{"word":"ghastly","example":""},{"word":"appall","example":""},{"word":"horror","example":""}]},{"unit_id":"unit_12","index":86,"word":"incommensurable","phonetic":"/ˌɪnkəˈmenʃərəbl/","pos":"adj.","core_en":"not measurable by the same standard","audio_src":"audio/086_incommensurable.mp3","patterns":["incommensurable values","incommensurable systems","incommensurable quantities"],"examples":[{"sentence":"The two theories rest on incommensurable assumptions."},{"sentence":"The description seemed incommensurable because it shaped how readers judged the evidence."}],"related":[{"word":"incomparable","example":""},{"word":"incompatible","example":""},{"word":"commensurable","example":""},{"word":"commensurate","example":""},{"word":"commensurability","example":""},{"word":"measure","example":""}]},{"unit_id":"unit_12","index":87,"word":"incommensurate","phonetic":"/ˌɪnkəˈmenʃərət/","pos":"adj.","core_en":"not proportionate or equal in measure","audio_src":"audio/087_incommensurate.mp3","patterns":["incommensurate with","incommensurate reward","incommensurate risk"],"examples":[{"sentence":"The punishment was incommensurate with the offense."},{"sentence":"The description seemed incommensurate because it shaped how readers judged the evidence."}],"related":[{"word":"disproportionate","example":""},{"word":"unequal","example":""},{"word":"commensurate","example":""},{"word":"proportionate","example":""},{"word":"measure","example":""}]},{"unit_id":"unit_12","index":88,"word":"shading","phonetic":"/ˈʃeɪdɪŋ/","pos":"n.","core_en":"a slight difference or gradation; use of shade","audio_src":"audio/088_shading.mp3","patterns":["subtle shading","shading of meaning","tonal shading"],"examples":[{"sentence":"The translator preserved the subtle shading of the original phrase."},{"sentence":"The issue became a useful example of shading in public debate."}],"related":[{"word":"nuance","example":""},{"word":"gradation","example":""},{"word":"uniformity","example":""},{"word":"shade","example":""},{"word":"shaded","example":""}]},{"unit_id":"unit_12","index":89,"word":"supercilious","phonetic":"/ˌsuːpərˈsɪliəs/","pos":"adj.","core_en":"behaving as if one is superior to others","audio_src":"audio/089_supercilious.mp3","patterns":["supercilious smile","supercilious tone","supercilious attitude"],"examples":[{"sentence":"His supercilious tone made the apology sound insincere."},{"sentence":"The description seemed supercilious because it shaped how readers judged the evidence."}],"related":[{"word":"arrogant","example":""},{"word":"haughty","example":""},{"word":"humble","example":""},{"word":"superciliously","example":""},{"word":"superiority","example":""}]},{"unit_id":"unit_12","index":90,"word":"overthrow","phonetic":"/ˌoʊvərˈθroʊ/","pos":"v./n.","core_en":"to remove a ruler or system from power","audio_src":"audio/090_overthrow.mp3","patterns":["overthrow a government","overthrow a ruler","overthrow a regime"],"examples":[{"sentence":"The rebels tried to overthrow the dictatorship."},{"sentence":"The rebels overthrew the ruler after months of fighting."}],"related":[{"word":"topple","example":""},{"word":"depose","example":""},{"word":"establish","example":""},{"word":"overthrower","example":""}]},{"unit_id":"unit_12","index":91,"word":"bewilder","phonetic":"/bɪˈwɪldər/","pos":"v.","core_en":"to confuse deeply","audio_src":"audio/091_bewilder.mp3","patterns":["bewilder students","bewilder observers","be bewildered by"],"examples":[{"sentence":"The contradictory instructions bewildered the new students."},{"sentence":"The sudden change bewildered observers."}],"related":[{"word":"confuse","example":""},{"word":"perplex","example":""},{"word":"clarify","example":""},{"word":"bewildered","example":""},{"word":"bewildering","example":""}]},{"unit_id":"unit_12","index":92,"word":"disparate","phonetic":"/ˈdɪspərət/","pos":"adj.","core_en":"fundamentally different or unlike","audio_src":"audio/092_disparate.mp3","patterns":["disparate groups","disparate elements","disparate data"],"examples":[{"sentence":"The report combines data from disparate sources."},{"sentence":"The description seemed disparate because it shaped how readers judged the evidence."}],"related":[{"word":"different","example":""},{"word":"heterogeneous","example":""},{"word":"similar","example":""},{"word":"disparity","example":""},{"word":"disparateness","example":""}]},{"unit_id":"unit_12","index":93,"word":"parity","phonetic":"/ˈpærəti/","pos":"n.","core_en":"equality or equivalence in status, amount, or value","audio_src":"audio/093_parity.mp3","patterns":["pay parity","gender parity","parity with"],"examples":[{"sentence":"The new law aims to achieve pay parity between men and women."},{"sentence":"The issue became a useful example of parity in public debate."}],"related":[{"word":"equality","example":""},{"word":"equivalence","example":""},{"word":"disparity","example":""},{"word":"par","example":""}]},{"unit_id":"unit_12","index":94,"word":"startle","phonetic":"/ˈstɑːrtl/","pos":"v.","core_en":"to surprise suddenly","audio_src":"audio/094_startle.mp3","patterns":["startle someone","be startled by","startling discovery"],"examples":[{"sentence":"The sudden noise startled the sleeping child."},{"sentence":"The alarm startled everyone in the room."}],"related":[{"word":"surprise","example":""},{"word":"alarm","example":""},{"word":"reassure","example":""},{"word":"startled","example":""},{"word":"startling","example":""}]},{"unit_id":"unit_12","index":95,"word":"stoicism","phonetic":"/ˈstoʊɪsɪzəm/","pos":"n.","core_en":"calm endurance of pain or difficulty","audio_src":"audio/095_stoicism.mp3","patterns":["show stoicism","stoicism under pressure","Stoicism as philosophy"],"examples":[{"sentence":"Her stoicism during the crisis encouraged the whole team."},{"sentence":"The issue became a useful example of stoicism in public debate."}],"related":[{"word":"endurance","example":""},{"word":"fortitude","example":""},{"word":"self-pity","example":""},{"word":"stoic","example":""},{"word":"stoically","example":""}]},{"unit_id":"unit_12","index":96,"word":"marvel","phonetic":"/ˈmɑːrvl/","pos":"n./v.","core_en":"a wonderful thing; to be filled with wonder","audio_src":"audio/096_marvel.mp3","patterns":["marvel at","a modern marvel","technological marvel"],"examples":[{"sentence":"Visitors marveled at the precision of the ancient bridge."},{"sentence":"Visitors marveled at the precision of the ancient clock."}],"related":[{"word":"wonder","example":""},{"word":"miracle","example":""},{"word":"ignore","example":""},{"word":"marvelous","example":""},{"word":"marvelously","example":""}]},{"unit_id":"unit_12","index":97,"word":"attest","phonetic":"/əˈtest/","pos":"v.","core_en":"to provide evidence or bear witness","audio_src":"audio/097_attest.mp3","patterns":["attest to","records attest","evidence attests"],"examples":[{"sentence":"The scars attest to the severity of the injury."},{"sentence":"Several witnesses attested to the accuracy of the report."}],"related":[{"word":"prove","example":""},{"word":"corroborate","example":""},{"word":"refute","example":""},{"word":"attestation","example":""},{"word":"testimony","example":""},{"word":"testify","example":""}]},{"unit_id":"unit_12","index":98,"word":"absurd","phonetic":"/əbˈsɜːrd/","pos":"adj.","core_en":"ridiculous because unreasonable or illogical","audio_src":"audio/098_absurd.mp3","patterns":["absurd claim","absurd idea","absurd situation"],"examples":[{"sentence":"It is absurd to blame the weather for every failure."},{"sentence":"The description seemed absurd because it shaped how readers judged the evidence."}],"related":[{"word":"ridiculous","example":""},{"word":"preposterous","example":""},{"word":"reasonable","example":""},{"word":"absurdity","example":""},{"word":"absurdly","example":""}]},{"unit_id":"unit_12","index":99,"word":"inspired","phonetic":"/ɪnˈspaɪərd/","pos":"adj.","core_en":"brilliant or filled with creative inspiration","audio_src":"audio/099_inspired.mp3","patterns":["inspired choice","inspired solution","inspired performance"],"examples":[{"sentence":"Her inspired solution saved the project."},{"sentence":"The description seemed inspired because it shaped how readers judged the evidence."}],"related":[{"word":"creative","example":""},{"word":"ingenious","example":""},{"word":"uninspired","example":""},{"word":"inspire","example":""},{"word":"inspiration","example":""}]},{"unit_id":"unit_12","index":100,"word":"prudent","phonetic":"/ˈpruːdnt/","pos":"adj.","core_en":"careful and sensible, especially about risk","audio_src":"audio/100_prudent.mp3","patterns":["prudent decision","prudent investor","prudent policy"],"examples":[{"sentence":"A prudent investor avoids risks that cannot be understood."},{"sentence":"The description seemed prudent because it shaped how readers judged the evidence."}],"related":[{"word":"careful","example":""},{"word":"judicious","example":""},{"word":"rash","example":""},{"word":"prudence","example":""},{"word":"prudently","example":""},{"word":"imprudent","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let unknown = new Set(JSON.parse(localStorage.getItem(storeKey) || '[]'));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function saveMarks() {
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
}

function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => {
    if (statusLine.textContent === t) statusLine.textContent = '';
  }, 2200);
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}

function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) {
    stopAudio();
    return;
  }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
  audio.play().catch(() => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}

function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}

function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    unknown.has(i.index) ? unknown.delete(i.index) : unknown.add(i.index);
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    playAudio(audioButton);
  });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}

function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}

function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => {
    if (!cardOverlay.classList.contains('open')) {
      floatingCardHost.innerHTML = '';
      cardOverlay.setAttribute('aria-hidden', 'true');
    }
  }, 260);
}

function selectedUnknownItems() {
  return unit.items.filter(i => unknown.has(i.index));
}

function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}

function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}

function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCard();
});
document.getElementById('clearMarks').addEventListener('click', () => {
  unknown = new Set();
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  try {
    await copyToClipboard(buildText(items));
    setStatus(`已复制 ${items.length} 个不会词`);
  } catch (e) {
    setStatus('复制失败，可以改用导出 CSV');
  }
});
saveMarks();
renderGrid();
</script>

</html>
