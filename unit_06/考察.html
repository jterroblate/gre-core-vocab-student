<script>
(function() {
  var AUTH_KEY = "gre_core_vocab_student_auth_v1";
  var AUTH_HASH = "6c7525332e9c649fd02547881102b234421192891292561dd720fa7985fc2e40";
  var root = document.documentElement;

  function setLockedState() {
    try {
      if (localStorage.getItem(AUTH_KEY) === AUTH_HASH) {
        root.classList.add("gre-auth-unlocked");
        root.classList.remove("gre-auth-locked");
        return false;
      }
    } catch (error) {}
    root.classList.add("gre-auth-locked");
    root.classList.remove("gre-auth-unlocked");
    return true;
  }

  function hex(buffer) {
    return Array.prototype.map.call(new Uint8Array(buffer), function(byte) {
      return byte.toString(16).padStart(2, "0");
    }).join("");
  }

  async function digest(value) {
    var data = new TextEncoder().encode(value);
    return hex(await crypto.subtle.digest("SHA-256", data));
  }

  function unlock() {
    try {
      localStorage.setItem(AUTH_KEY, AUTH_HASH);
    } catch (error) {}
    root.classList.add("gre-auth-unlocked");
    root.classList.remove("gre-auth-locked");
    var gate = document.getElementById("greAuthGate");
    if (gate) gate.remove();
  }

  function installGate() {
    if (!setLockedState() || document.getElementById("greAuthGate")) return;
    var gate = document.createElement("div");
    gate.id = "greAuthGate";
    gate.innerHTML = '<form class="gre-auth-card" id="greAuthForm">' +
      '<p class="gre-auth-kicker">Student Access</p>' +
      '<h1 class="gre-auth-title">GRE 核心词汇一本通</h1>' +
      '<p class="gre-auth-copy">请输入老师提供的访问密码。</p>' +
      '<input class="gre-auth-field" id="greAuthPassword" type="password" autocomplete="current-password" placeholder="访问密码" autofocus>' +
      '<button class="gre-auth-submit" type="submit">进入学习页面</button>' +
      '<p class="gre-auth-error" id="greAuthError" aria-live="polite"></p>' +
    '</form>';
    document.body.appendChild(gate);
    var form = document.getElementById("greAuthForm");
    var input = document.getElementById("greAuthPassword");
    var error = document.getElementById("greAuthError");
    if (input) input.focus();
    form.addEventListener("submit", async function(event) {
      event.preventDefault();
      error.textContent = "";
      var value = input.value || "";
      if (!window.crypto || !crypto.subtle) {
        error.textContent = "当前浏览器不支持安全校验，请换用最新版 Chrome 或 Safari。";
        return;
      }
      if (await digest(value) === AUTH_HASH) {
        unlock();
      } else {
        input.value = "";
        input.focus();
        error.textContent = "密码不正确，请重新输入。";
      }
    });
  }

  setLockedState();
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installGate);
  } else {
    installGate();
  }
})();
</script>

e","susceptible to influence","susceptible to error","susceptible to infection","susceptible to disease","susceptible to damage"],"examples":[{"sentence":"Young readers may be especially susceptible to misleading advertisements."},{"sentence":"Plants weakened by drought are more susceptible to disease."}],"related":[{"word":"vulnerable","example":""},{"word":"prone","example":""},{"word":"resistant","example":""},{"word":"immune","example":""},{"word":"receptive","example":""}]},{"unit_id":"unit_06","index":89,"word":"insulate","phonetic":"/ˈɪnsəleɪt/","pos":"v.","core_en":"to protect something by separating it from heat, cold, noise, electricity, or harmful influence","audio_src":"audio/089_insulate.mp3","patterns":["insulate a house","insulate wires","insulate against noise","insulate someone from criticism","insulate an economy from shocks","insulate against risk"],"examples":[{"sentence":"The walls were insulated to reduce heat loss during winter."},{"sentence":"The central bank was designed to be insulated from short-term political pressure."}],"related":[{"word":"protect","example":""},{"word":"shield","example":""},{"word":"sequester","example":""},{"word":"expose","example":""},{"word":"isolate","example":""}]},{"unit_id":"unit_06","index":90,"word":"concise","phonetic":"/kənˈsaɪs/","pos":"adj.","core_en":"giving necessary information clearly in few words","audio_src":"audio/090_concise.mp3","patterns":["a concise explanation","concise writing","a concise summary"],"examples":[{"sentence":"The editor asked for a more concise summary of the findings."},{"sentence":"A concise definition can be more useful than a long list of examples."}],"related":[{"word":"brief","example":""},{"word":"succinct","example":""},{"word":"terse","example":""},{"word":"wordy","example":""},{"word":"verbose","example":""},{"word":"short","example":""}]},{"unit_id":"unit_06","index":91,"word":"hearten","phonetic":"/ˈhɑːrtn/","pos":"v.","core_en":"to make someone feel more cheerful, hopeful, or confident","audio_src":"audio/091_hearten.mp3","patterns":["be heartened by","heartened to see","heartening news"],"examples":[{"sentence":"The researchers were heartened by the early results of the trial."},{"sentence":"It is heartening to see young voters take an interest in local politics."}],"related":[{"word":"encourage","example":""},{"word":"embolden","example":""},{"word":"discourage","example":""},{"word":"dishearten","example":""},{"word":"harden","example":""}]},{"unit_id":"unit_06","index":92,"word":"aggrandize","phonetic":"/əˈɡrændaɪz/","pos":"v.","core_en":"to increase the power, wealth, importance, or reputation of someone or something","audio_src":"audio/092_aggrandize.mp3","patterns":["aggrandize power","aggrandize the state","aggrandize oneself"],"examples":[{"sentence":"The ruler used war to aggrandize his own power."},{"sentence":"The memoir was criticized as an attempt to aggrandize the author's role in the movement."}],"related":[{"word":"increase","example":""},{"word":"magnify","example":""},{"word":"exalt","example":""},{"word":"diminish","example":""},{"word":"humble","example":""},{"word":"grandiose","example":""}]},{"unit_id":"unit_06","index":93,"word":"esteem","phonetic":"/ɪˈstiːm/","pos":"v./n.","core_en":"to respect and admire someone, or the respect itself","audio_src":"audio/093_esteem.mp3","patterns":["esteem someone for","be highly esteemed","hold someone in esteem","public esteem","self-esteem","in high esteem"],"examples":[{"sentence":"Her colleagues esteemed her for her honesty and patience."},{"sentence":"The old teacher was loved by students and esteemed by other scholars."},{"sentence":"The scientist remained in high esteem even after her theory was revised."}],"related":[{"word":"respect","example":""},{"word":"revere","example":""},{"word":"admire","example":""},{"word":"disrespect","example":""},{"word":"contempt","example":""},{"word":"estimate","example":""}]},{"unit_id":"unit_06","index":94,"word":"juxtaposition","phonetic":"/ˌdʒʌkstəpəˈzɪʃn/","pos":"n.","core_en":"the placement of two things side by side, often to show contrast","audio_src":"audio/094_juxtaposition.mp3","patterns":["the juxtaposition of A and B","a striking juxtaposition","visual juxtaposition"],"examples":[{"sentence":"The painting creates a striking juxtaposition of wealth and poverty."},{"sentence":"The essay's power comes from its juxtaposition of scientific optimism and political anxiety."}],"related":[{"word":"contrast","example":""},{"word":"apposition","example":""},{"word":"separation","example":""},{"word":"composition","example":""}]},{"unit_id":"unit_06","index":95,"word":"stingy","phonetic":"/ˈstɪndʒi/","pos":"adj.","core_en":"unwilling to give or spend money, time, or resources","audio_src":"audio/095_stingy.mp3","patterns":["stingy with money","stingy with praise","a stingy budget"],"examples":[{"sentence":"The manager was generous with criticism but stingy with praise."},{"sentence":"A stingy budget left the researchers unable to test their theory properly."}],"related":[{"word":"cheap","example":""},{"word":"miserly","example":""},{"word":"parsimonious","example":""},{"word":"generous","example":""},{"word":"lavish","example":""},{"word":"frugal","example":""}]},{"unit_id":"unit_06","index":96,"word":"autocratic","phonetic":"/ˌɔːtəˈkrætɪk/","pos":"adj.","core_en":"ruling or making decisions with absolute power","audio_src":"audio/096_autocratic.mp3","patterns":["autocratic ruler","autocratic government","autocratic leadership"],"examples":[{"sentence":"The autocratic ruler suppressed criticism and controlled the courts."},{"sentence":"Employees complained that the new director's autocratic style left no room for discussion."}],"related":[{"word":"dictatorial","example":""},{"word":"authoritarian","example":""},{"word":"despotic","example":""},{"word":"democratic","example":""},{"word":"participatory","example":""},{"word":"automatic","example":""}]},{"unit_id":"unit_06","index":97,"word":"genteel","phonetic":"/dʒenˈtiːl/","pos":"adj.","core_en":"polite and refined, sometimes in an affected or overly proper way","audio_src":"audio/097_genteel.mp3","patterns":["genteel manners","genteel poverty","genteel neighborhood"],"examples":[{"sentence":"Her genteel manners concealed a sharp and practical mind."},{"sentence":"The novel mocks the family's genteel poverty: they have no money but insist on refined appearances."}],"related":[{"word":"polite","example":""},{"word":"refined","example":""},{"word":"affected","example":""},{"word":"coarse","example":""},{"word":"vulgar","example":""},{"word":"gentle","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let unknown = new Set(JSON.parse(localStorage.getItem(storeKey) || '[]'));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function saveMarks() {
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
}

function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => {
    if (statusLine.textContent === t) statusLine.textContent = '';
  }, 2200);
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}

function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) {
    stopAudio();
    return;
  }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
  audio.play().catch(() => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}

function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}

function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    unknown.has(i.index) ? unknown.delete(i.index) : unknown.add(i.index);
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    playAudio(audioButton);
  });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}

function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}

function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => {
    if (!cardOverlay.classList.contains('open')) {
      floatingCardHost.innerHTML = '';
      cardOverlay.setAttribute('aria-hidden', 'true');
    }
  }, 260);
}

function selectedUnknownItems() {
  return unit.items.filter(i => unknown.has(i.index));
}

function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}

function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}

function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCard();
});
document.getElementById('clearMarks').addEventListener('click', () => {
  unknown = new Set();
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  try {
    await copyToClipboard(buildText(items));
    setStatus(`已复制 ${items.length} 个不会词`);
  } catch (e) {
    setStatus('复制失败，可以改用导出 CSV');
  }
});
saveMarks();
renderGrid();
</script>
