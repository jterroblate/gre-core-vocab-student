,"patterns":["collaborate on a project","collaborate with researchers","collaborate to create","collaborate with the enemy","accused of collaborating"],"examples":[{"sentence":"The two laboratories collaborated on a study of air pollution."},{"sentence":"Several officials were accused of collaborating with the occupying army."}],"related":[{"word":"cooperate","example":""},{"word":"partner","example":""},{"word":"coordinate","example":""},{"word":"compete","example":""},{"word":"obstruct","example":""}]},{"unit_id":"unit_08","index":89,"word":"hectic","phonetic":"/ˈhektɪk/","pos":"adj.","core_en":"full of hurried, intense, and often chaotic activity","audio_src":"audio/089_hectic.mp3","patterns":["a hectic day","a hectic schedule","a hectic week","a hectic pace","hectic city life","a hectic routine"],"examples":[{"sentence":"After a hectic morning of meetings, she needed an hour alone."},{"sentence":"The hectic pace of the newsroom left little time for careful reflection."}],"related":[{"word":"busy","example":""},{"word":"frantic","example":""},{"word":"frenetic","example":""},{"word":"calm","example":""},{"word":"leisurely","example":""}]},{"unit_id":"unit_08","index":90,"word":"duplicate","phonetic":"/ˈduːplɪkeɪt/","pos":"v.; adj.; n.","core_en":"to make an exact copy; an exact copy or repeated version","audio_src":"audio/090_duplicate.mp3","patterns":["duplicate a document","make a duplicate","duplicate copy","duplicate the results","duplicate a success","be difficult to duplicate","duplicate effort","duplicate records"],"examples":[{"sentence":"Please duplicate the document before the meeting."},{"sentence":"Other labs could not duplicate the original findings."},{"sentence":"The new database prevents staff from doing duplicate work."}],"related":[{"word":"copy","example":""},{"word":"replicate","example":""},{"word":"reproduce","example":""},{"word":"original","example":""},{"word":"unique","example":""}]},{"unit_id":"unit_08","index":91,"word":"antiquarian","phonetic":"/ˌæntɪˈkweriən/","pos":"adj.; n.","core_en":"relating to antiques or rare books; a person who studies or deals in them","audio_src":"audio/091_antiquarian.mp3","patterns":["antiquarian books","an antiquarian bookshop","antiquarian interest","an antiquarian","antiquarian research","a noted antiquarian"],"examples":[{"sentence":"The scholar spent the afternoon in an antiquarian bookshop."},{"sentence":"An antiquarian identified the manuscript as a seventeenth-century copy."}],"related":[{"word":"antique","example":""},{"word":"archival","example":""},{"word":"historical","example":""},{"word":"modern","example":""},{"word":"contemporary","example":""}]},{"unit_id":"unit_08","index":92,"word":"purport","phonetic":"/pərˈpɔːrt/","pos":"v.; n.","core_en":"to claim to be or do something; the main meaning or intention of something","audio_src":"audio/092_purport.mp3","patterns":["purport to show","purport to prove","purported evidence","the purport of a statement","understand the purport","general purport"],"examples":[{"sentence":"The video purports to show the mayor accepting a bribe."},{"sentence":"The purport of the letter was clear: the agreement had failed."}],"related":[{"word":"claim","example":""},{"word":"profess","example":""},{"word":"allege","example":""},{"word":"verify","example":""},{"word":"disprove","example":""}]},{"unit_id":"unit_08","index":93,"word":"accretion","phonetic":"/əˈkriːʃən/","pos":"n.","core_en":"gradual growth by the accumulation of layers or additions","audio_src":"audio/093_accretion.mp3","patterns":["the accretion of sediment","gradual accretion","accretion disk","the accretion of power","steady accretion","accretions of wealth"],"examples":[{"sentence":"The island grew through the slow accretion of sediment."},{"sentence":"The constitution was altered by the gradual accretion of executive power."}],"related":[{"word":"accumulation","example":""},{"word":"buildup","example":""},{"word":"aggregation","example":""},{"word":"erosion","example":""},{"word":"depletion","example":""}]},{"unit_id":"unit_08","index":94,"word":"sensory","phonetic":"/ˈsensəri/","pos":"adj.","core_en":"related to the physical senses or sensation","audio_src":"audio/094_sensory.mp3","patterns":["sensory input","sensory experience","sensory information","sensory nerves","sensory loss","sensory processing"],"examples":[{"sentence":"The exhibit gives children a rich sensory experience through sound and texture."},{"sentence":"Damage to sensory nerves can reduce the ability to feel pain."}],"related":[{"word":"perceptual","example":""},{"word":"somatic","example":""},{"word":"tactile","example":""},{"word":"motor","example":""},{"word":"insensate","example":""}]},{"unit_id":"unit_08","index":95,"word":"sensuous","phonetic":"/ˈsenʃuəs/","pos":"adj.","core_en":"pleasing to the senses, especially through beauty, sound, touch, or taste","audio_src":"audio/095_sensuous.mp3","patterns":["sensuous music","sensuous curves","sensuous texture","a sensuous fabric","sensuous pleasure","sensuous color"],"examples":[{"sentence":"The poem is filled with sensuous images of fruit, rain, and warm light."},{"sentence":"The velvet had a sensuous softness that made the room feel warm."}],"related":[{"word":"pleasant","example":""},{"word":"sensual","example":""},{"word":"aesthetic","example":""},{"word":"austere","example":""},{"word":"cerebral","example":""},{"word":"sensory","example":""}]},{"unit_id":"unit_08","index":96,"word":"sensuality","phonetic":"/ˌsenʃuˈæləti/","pos":"n.","core_en":"enjoyment of physical or sensory pleasure, often with sexual overtones","audio_src":"audio/096_sensuality.mp3","patterns":["a sense of sensuality","restrained sensuality","visual sensuality","sensuality and desire","worldly sensuality","open sensuality"],"examples":[{"sentence":"The dance combines discipline with a quiet sensuality."},{"sentence":"The novel contrasts spiritual discipline with worldly sensuality."}],"related":[{"word":"pleasure","example":""},{"word":"voluptuousness","example":""},{"word":"sensuousness","example":""},{"word":"asceticism","example":""},{"word":"austerity","example":""},{"word":"sensibility","example":""}]},{"unit_id":"unit_08","index":97,"word":"tortuous","phonetic":"/ˈtɔːrtʃuəs/","pos":"adj.","core_en":"full of twists, turns, or complicated indirect steps","audio_src":"audio/097_tortuous.mp3","patterns":["a tortuous road","a tortuous path","a tortuous route","a tortuous argument","a tortuous process","tortuous prose"],"examples":[{"sentence":"The village could be reached only by a tortuous mountain road."},{"sentence":"The essay's tortuous argument made a simple point hard to follow."}],"related":[{"word":"winding","example":""},{"word":"convoluted","example":""},{"word":"circuitous","example":""},{"word":"straight","example":""},{"word":"straightforward","example":""},{"word":"torturous","example":""}]},{"unit_id":"unit_08","index":98,"word":"penetrating","phonetic":"/ˈpenətreɪtɪŋ/","pos":"adj.","core_en":"able to pass deeply through something, or showing deep insight","audio_src":"audio/098_penetrating.mp3","patterns":["a penetrating voice","penetrating cold","a penetrating gaze","penetrating insight","a penetrating analysis","a penetrating question"],"examples":[{"sentence":"A penetrating cold filled the stone corridor."},{"sentence":"Her penetrating analysis exposed the weakness in the theory."}],"related":[{"word":"sharp","example":""},{"word":"insightful","example":""},{"word":"incisive","example":""},{"word":"superficial","example":""},{"word":"dull","example":""}]},{"unit_id":"unit_08","index":99,"word":"impenetrable","phonetic":"/ɪmˈpenɪtrəbl/","pos":"adj.","core_en":"impossible to pass through or understand","audio_src":"audio/099_impenetrable.mp3","patterns":["an impenetrable forest","impenetrable armor","an impenetrable barrier","impenetrable prose","an impenetrable theory","impenetrable silence"],"examples":[{"sentence":"The explorers faced an impenetrable wall of vines."},{"sentence":"The philosopher's prose was elegant but nearly impenetrable."}],"related":[{"word":"inaccessible","example":""},{"word":"opaque","example":""},{"word":"inscrutable","example":""},{"word":"penetrable","example":""},{"word":"clear","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let unknown = new Set(JSON.parse(localStorage.getItem(storeKey) || '[]'));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function saveMarks() {
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
}

function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => {
    if (statusLine.textContent === t) statusLine.textContent = '';
  }, 2200);
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}

function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) {
    stopAudio();
    return;
  }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
  audio.play().catch(() => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}

function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}

function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    unknown.has(i.index) ? unknown.delete(i.index) : unknown.add(i.index);
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    playAudio(audioButton);
  });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}

function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}

function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => {
    if (!cardOverlay.classList.contains('open')) {
      floatingCardHost.innerHTML = '';
      cardOverlay.setAttribute('aria-hidden', 'true');
    }
  }, 260);
}

function selectedUnknownItems() {
  return unit.items.filter(i => unknown.has(i.index));
}

function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}

function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}

function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCard();
});
document.getElementById('clearMarks').addEventListener('click', () => {
  unknown = new Set();
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  try {
    await copyToClipboard(buildText(items));
    setStatus(`已复制 ${items.length} 个不会词`);
  } catch (e) {
    setStatus('复制失败，可以改用导出 CSV');
  }
});
saveMarks();
renderGrid();
</script>

</html>
