","pos":"adjective","core_en":"no longer fashionable, useful, or suitable for the present","audio_src":"audio/092_outmoded.mp3","patterns":["outmoded ideas","outmoded technology","an outmoded building"],"examples":[{"sentence":"The school still relied on outmoded teaching methods."},{"sentence":"The old factory used outmoded machinery."}],"related":[{"word":"old-fashioned","example":""},{"word":"obsolete","example":""},{"word":"antiquated","example":""},{"word":"modern","example":""},{"word":"up-to-date","example":""},{"word":"mode","example":""},{"word":"modernize","example":""}]},{"unit_id":"unit_25","index":93,"word":"exposition","phonetic":"/ˌekspəˈzɪʃən/","pos":"noun","core_en":"a detailed explanation or presentation of an idea, theory, or background information","audio_src":"audio/093_exposition.mp3","patterns":["a clear exposition","exposition of a theory","background exposition"],"examples":[{"sentence":"The chapter offers a clear exposition of the theory."},{"sentence":"The film begins with too much background exposition."}],"related":[{"word":"explanation","example":""},{"word":"account","example":""},{"word":"elucidation","example":""},{"word":"obscurity","example":""},{"word":"expose","example":""},{"word":"expository","example":""},{"word":"expositor","example":""}]},{"unit_id":"unit_25","index":94,"word":"cite","phonetic":"/saɪt/","pos":"verb","core_en":"to quote or mention something as evidence, authority, or support","audio_src":"audio/094_cite.mp3","patterns":["cite evidence","cite a source","cite as an example"],"examples":[{"sentence":"The article cites several studies to support its claim."},{"sentence":"She cited poor health as the reason for her resignation."}],"related":[{"word":"quote","example":""},{"word":"mention","example":""},{"word":"invoke","example":""},{"word":"ignore","example":""},{"word":"citation","example":""},{"word":"recite","example":""},{"word":"cite/sight/site","example":""}]},{"unit_id":"unit_25","index":95,"word":"introduce","phonetic":"/ˌɪntrəˈduːs/","pos":"verb","core_en":"to bring something into a place, system, or discussion for the first time","audio_src":"audio/095_introduce.mp3","patterns":["introduce a species","introduce a policy","introduce a concept"],"examples":[{"sentence":"The species was introduced to the island by traders."},{"sentence":"The teacher introduced the concept with a simple example."}],"related":[{"word":"bring in","example":""},{"word":"import","example":""},{"word":"inaugurate","example":""},{"word":"remove","example":""},{"word":"exclude","example":""},{"word":"introduction","example":""},{"word":"introductory","example":""},{"word":"produce","example":""}]},{"unit_id":"unit_25","index":96,"word":"overload","phonetic":"/ˌoʊvərˈloʊd/","pos":"verb / noun","core_en":"to put too much weight, work, or information on someone or something","audio_src":"audio/096_overload.mp3","patterns":["overload a system","information overload","be overloaded with work"],"examples":[{"sentence":"Too many requests can overload the server."},{"sentence":"Students felt overloaded with information before the exam."}],"related":[{"word":"burden","example":""},{"word":"overwhelm","example":""},{"word":"saturate","example":""},{"word":"relieve","example":""},{"word":"unburden","example":""},{"word":"load","example":""},{"word":"overloaded","example":""},{"word":"workload","example":""}]},{"unit_id":"unit_25","index":97,"word":"diligent","phonetic":"/ˈdɪlɪdʒənt/","pos":"adjective","core_en":"careful, steady, and hardworking in one’s duties","audio_src":"audio/097_diligent.mp3","patterns":["a diligent student","diligent work","diligent research"],"examples":[{"sentence":"The diligent student reviewed every mistake."},{"sentence":"Her diligent research uncovered errors in the report."}],"related":[{"word":"hardworking","example":""},{"word":"conscientious","example":""},{"word":"assiduous","example":""},{"word":"lazy","example":""},{"word":"negligent","example":""},{"word":"diligence","example":""},{"word":"diligently","example":""}]},{"unit_id":"unit_25","index":98,"word":"pathos","phonetic":"/ˈpeɪθɑːs/","pos":"noun","core_en":"a quality that evokes pity, sadness, or tender emotion","audio_src":"audio/098_pathos.mp3","patterns":["a sense of pathos","deep pathos","pathos in the scene"],"examples":[{"sentence":"The final scene has real pathos without becoming sentimental."},{"sentence":"Her speech used pathos to move the audience."}],"related":[{"word":"sadness","example":""},{"word":"poignancy","example":""},{"word":"sentimentality","example":""},{"word":"comedy","example":""},{"word":"detachment","example":""},{"word":"pathetic","example":""},{"word":"empathy","example":""},{"word":"ethos/logos/pathos","example":""}]},{"unit_id":"unit_25","index":99,"word":"tendentious","phonetic":"/tenˈdenʃəs/","pos":"adjective","core_en":"expressing a strong, biased point of view, especially in a controversial way","audio_src":"audio/099_tendentious.mp3","patterns":["a tendentious article","tendentious reporting","a tendentious argument"],"examples":[{"sentence":"The editorial was criticized as tendentious and one-sided."},{"sentence":"His tendentious interpretation ignored evidence on the other side."}],"related":[{"word":"biased","example":""},{"word":"partial","example":""},{"word":"partisan","example":""},{"word":"impartial","example":""},{"word":"objective","example":""},{"word":"tendency","example":""},{"word":"tend","example":""},{"word":"tendentiously","example":""}]},{"unit_id":"unit_25","index":100,"word":"willingness","phonetic":"/ˈwɪlɪŋnəs/","pos":"noun","core_en":"readiness or preparedness to do something","audio_src":"audio/100_willingness.mp3","patterns":["willingness to cooperate","willingness to change","show willingness"],"examples":[{"sentence":"Her willingness to cooperate helped resolve the dispute."},{"sentence":"The study measured people’s willingness to take financial risks."}],"related":[{"word":"readiness","example":""},{"word":"inclination","example":""},{"word":"volition","example":""},{"word":"reluctance","example":""},{"word":"unwillingness","example":""},{"word":"willing","example":""},{"word":"unwilling","example":""},{"word":"will","example":""}]}]}</script>
  <script>
const unit = JSON.parse(document.getElementById('unitData').textContent);
const grid = document.getElementById('wordGrid');
const cardOverlay = document.getElementById('cardOverlay');
const overlayBackdrop = document.getElementById('overlayBackdrop');
const floatingCardHost = document.getElementById('floatingCardHost');
const missedCount = document.getElementById('missedCount');
const statusLine = document.getElementById('statusLine');
const searchInput = document.getElementById('searchInput');
const storeKey = `baotingxie:${unit.unit_id}:unknown`;
let activeIndex = null;
let currentAudio = null;
let currentAudioButton = null;
let unknown = new Set(JSON.parse(localStorage.getItem(storeKey) || '[]'));

function escapeHtml(v) {
  return String(v ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function saveMarks() {
  localStorage.setItem(storeKey, JSON.stringify([...unknown].sort((a, b) => a - b)));
  missedCount.textContent = unknown.size;
}

function setStatus(t) {
  statusLine.textContent = t;
  if (t) window.setTimeout(() => {
    if (statusLine.textContent === t) statusLine.textContent = '';
  }, 2200);
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (currentAudioButton) currentAudioButton.classList.remove('playing', 'error');
  currentAudio = null;
  currentAudioButton = null;
}

function playAudio(button) {
  const src = button.dataset.audio;
  if (!src) return;
  if (currentAudioButton === button && currentAudio && !currentAudio.paused) {
    stopAudio();
    return;
  }
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  currentAudioButton = button;
  button.classList.add('playing');
  audio.addEventListener('ended', stopAudio);
  audio.addEventListener('error', () => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
  audio.play().catch(() => {
    button.classList.remove('playing');
    button.classList.add('error');
    setStatus('音频暂时无法播放');
  });
}

function renderGrid() {
  const q = searchInput.value.trim().toLowerCase();
  const items = unit.items.filter(i => !q || i.word.toLowerCase().includes(q));
  grid.innerHTML = items.map(i => `<button class="word-btn ${unknown.has(i.index) ? 'unknown' : ''} ${activeIndex === i.index ? 'active' : ''}" type="button" data-index="${i.index}"><span class="word-index">${String(i.index).padStart(3, '0')}</span><span class="word-label">${escapeHtml(i.word)}</span></button>`).join('');
  if (!items.length) grid.innerHTML = '<div class="empty">没有匹配的单词</div>';
}

function renderCardHtml(i) {
  const patterns = i.patterns.length ? `<section class="block"><h3>Patterns</h3><div class="pattern-row">${i.patterns.map(p => `<span class="chip">${escapeHtml(p)}</span>`).join('')}</div></section>` : '';
  const examples = i.examples.length ? `<section class="block"><h3>Example Sentences</h3><div class="examples">${i.examples.map(e => `<p class="example">${escapeHtml(e.sentence)}</p>`).join('')}</div></section>` : '';
  const related = i.related.length ? `<section class="block"><h3>Related English Cues</h3><div class="related-grid">${i.related.map(r => `<div class="related-item"><strong>${escapeHtml(r.word)}</strong>${r.example ? `<p>${escapeHtml(r.example)}</p>` : ''}</div>`).join('')}</div></section>` : '';
  const audioButton = i.audio_src ? `<button class="pronounce-btn" type="button" data-audio="${escapeHtml(i.audio_src)}" aria-label="Play pronunciation" title="Play pronunciation">▶</button>` : '';
  return `<article class="detail-card ${unknown.has(i.index) ? 'unknown' : ''}"><header class="detail-head"><div class="detail-title"><div class="detail-title-row"><h2>${escapeHtml(i.word)}</h2>${audioButton}</div><div class="meta">${escapeHtml([i.phonetic, i.pos].filter(Boolean).join(' · '))}</div></div><div class="detail-actions"><button class="danger-btn" id="toggleUnknown" type="button">${unknown.has(i.index) ? '取消不会' : '标记不会'}</button><button class="ghost-btn" id="closeCard" type="button">收起卡片</button></div></header>${i.core_en ? `<p class="core-line">${escapeHtml(i.core_en)}</p>` : ''}${patterns}${examples}${related}</article>`;
}

function mountCard(i) {
  stopAudio();
  floatingCardHost.innerHTML = renderCardHtml(i);
  document.getElementById('toggleUnknown').addEventListener('click', () => {
    unknown.has(i.index) ? unknown.delete(i.index) : unknown.add(i.index);
    saveMarks();
    renderGrid();
    mountCard(i);
  });
  document.getElementById('closeCard').addEventListener('click', closeCard);
  const audioButton = floatingCardHost.querySelector('.pronounce-btn');
  if (audioButton) audioButton.addEventListener('click', event => {
    event.preventDefault();
    event.stopPropagation();
    playAudio(audioButton);
  });
  document.getElementById('toggleUnknown').focus({preventScroll: true});
}

function openCard(i) {
  activeIndex = i.index;
  renderGrid();
  mountCard(i);
  cardOverlay.setAttribute('aria-hidden', 'false');
  document.body.classList.add('overlay-open');
  requestAnimationFrame(() => cardOverlay.classList.add('open'));
}

function closeCard() {
  if (!cardOverlay.classList.contains('open')) return;
  stopAudio();
  cardOverlay.classList.remove('open');
  document.body.classList.remove('overlay-open');
  activeIndex = null;
  renderGrid();
  window.setTimeout(() => {
    if (!cardOverlay.classList.contains('open')) {
      floatingCardHost.innerHTML = '';
      cardOverlay.setAttribute('aria-hidden', 'true');
    }
  }, 260);
}

function selectedUnknownItems() {
  return unit.items.filter(i => unknown.has(i.index));
}

function csvValue(v) {
  const t = String(v ?? '');
  return /[",\n]/.test(t) ? `"${t.replaceAll('"', '""')}"` : t;
}

function buildCsv(items) {
  const header = ['unit_id', 'index', 'word', 'phonetic', 'pos', 'core_en', 'patterns', 'example_sentences'];
  const rows = items.map(i => [i.unit_id, String(i.index).padStart(3, '0'), i.word, i.phonetic, i.pos, i.core_en, i.patterns.join('; '), i.examples.map(e => e.sentence).join(' | ')]);
  return [header, ...rows].map(r => r.map(csvValue).join(',')).join('\n');
}

function buildText(items) {
  return items.map(i => {
    const ex = i.examples[0]?.sentence || '';
    return `${String(i.index).padStart(3, '0')} ${i.word}${i.pos ? ` (${i.pos})` : ''} - ${i.core_en}${ex ? ` | ${ex}` : ''}`;
  }).join('\n');
}

grid.addEventListener('click', e => {
  const b = e.target.closest('.word-btn');
  if (!b) return;
  const i = unit.items.find(i => i.index === Number(b.dataset.index));
  if (i) openCard(i);
});
searchInput.addEventListener('input', renderGrid);
overlayBackdrop.addEventListener('click', closeCard);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCard();
});
document.getElementById('clearMarks').addEventListener('click', () => {
  unknown = new Set();
  saveMarks();
  renderGrid();
  if (activeIndex) {
    const i = unit.items.find(i => i.index === activeIndex);
    if (i) mountCard(i);
  }
  setStatus('已清空全部标记');
});
document.getElementById('exportCsv').addEventListener('click', () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  const blob = new Blob([buildCsv(items)], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${unit.unit_id}_baotingxie_unknown.csv`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus(`已导出 ${items.length} 个不会词`);
});
async function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.setAttribute('readonly', '');
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
}
document.getElementById('copyText').addEventListener('click', async () => {
  const items = selectedUnknownItems();
  if (!items.length) {
    setStatus('还没有标记不会的词');
    return;
  }
  try {
    await copyToClipboard(buildText(items));
    setStatus(`已复制 ${items.length} 个不会词`);
  } catch (e) {
    setStatus('复制失败，可以改用导出 CSV');
  }
});
saveMarks();
renderGrid();
</script>

</html>
